        <div class="pagamento1">
            <h2>Total: R$ <span id="valorTotalText">0.00</span></h2>
            <div class="item1">
                <input type="radio" id="checkmark1" name="optcompra" value="Vista" checked>
                <label for="checkmark1">À Vista</label>
            </div> 
            <div class="item1">
                <input type="radio" id="checkmark2" name="optcompra" value="Credito">
                <label for="checkmark2">À Prazo</label>
            </div>
            <div class="item1"></div>
                <label for="parcelas1">Quantidade de Parcelas:</label>
                <select id="parcelas1" name="parcelas">
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
            </select>
            <button type="button" id="btnPagar">Pagar</button>
            </div>
        </div>
    </form>
    <script>
        let valorTotal = document.getElementById("valorTotalText");;

        const btnPagar = document.getElementById("btnPagar");
        const produtos = document.querySelectorAll(".prodCheck");
        const quantidades = document.querySelectorAll(".inpQuant");
        const checkmark1 = document.getElementById("checkmark1");
        const checkmark2 = document.getElementById("checkmark2");
        const parcelas1 = document.getElementById("parcelas1");

        function tipoPagamento () {
            parcelas1.disabled = checkmark1.checked;
        }

        function calculoTotal() {

            let total = 0;
            let quantParcelas = parseInt(parcelas1.value);

            produtos.forEach((produto, index) => {

                if (produto.checked) {
                    let preco = parseFloat(produto.dataset.valor);
                    let quantidade = parseInt(quantidades[index].value) || 1;

                    total += preco * quantidade;
                }
            });

            if (checkmark1.checked) {
                total = total * 0.915;
            } else {
                let juros = total * 0.06;
                let taxaParcelas = quantParcelas * 6.90;
                
                total = total + juros + taxaParcelas;
                
                let valorParcela = total / quantParcelas;

                if (valorParcela < 10) {
                    alert("A parcela é menor que R$10,00.\nMude a quantidade de parcelas ou a forma de pagamento");
                    return;
                }
            }

            valorTotal.textContent = total.toFixed(2);
        }
        
        quantidades.forEach(qtd => {
            qtd.addEventListener("input", calculoTotal);
            qtd.disabled = true;
        });

        checkmark1.addEventListener("change", tipoPagamento);
        checkmark1.addEventListener("change", calculoTotal);
        checkmark2.addEventListener("change", tipoPagamento);
        checkmark2.addEventListener("change", calculoTotal);
        parcelas1.addEventListener("change", calculoTotal);

        produtos.forEach((produto, index) => {

            produto.addEventListener("change", () => {

                if (produto.checked) {
                    quantidades[index].disabled = false;
                } else {
                    quantidades[index].disabled = true;
                    quantidades[index].value = ""; 
                }

            calculoTotal();
            });
        });

        tipoPagamento();
    </script>
</body>
